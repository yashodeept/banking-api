name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: banking_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secretpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Database Migrations
        env:
          DATABASE_URL: "postgresql://postgres:secretpassword@localhost:5432/banking_test_db?schema=public"
        run: npx prisma migrate deploy

      - name: Execute Automated Integration Test Suite
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://postgres:secretpassword@localhost:5432/banking_test_db?schema=public"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "test_access_secret_key"
          JWT_REFRESH_SECRET: "test_refresh_secret_key"
        run: npm test

      - name: Validate Container Build
        run: docker build . -t banking-api:test
